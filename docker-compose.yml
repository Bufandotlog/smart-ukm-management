version: '3.8'

services:
  # 1. Database Service (Private, no public ports exposed)
  db:
    image: mariadb:10.11-alpine
    container_name: ukm_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/surat_schema.sql:/docker-entrypoint-initdb.d/02-surat_schema.sql:ro
      - ./database/migration_role_sekretaris.sql:/docker-entrypoint-initdb.d/03-migration-role-sekretaris.sql:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - ukm_net

  # 2. PHP Application Service (Private, runs PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ukm_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    security_opt:
      - no-new-privileges:true
    depends_on:
      - db
    networks:
      - ukm_net

  # 3. Web Server/Reverse Proxy Service (Only maps public port 80 & 443)
  web:
    image: nginx:alpine
    container_name: ukm_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app
    networks:
      - ukm_net

volumes:
  db_data:

networks:
  ukm_net:
    driver: bridge
