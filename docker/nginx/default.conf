# HTTP Server (Redirects all traffic to HTTPS, supports Let's Encrypt validation)
server {
    listen 80;
    listen [::]:80;
    server_name ukminstbunas.cloud www.ukminstbunas.cloud;

    # Let's Encrypt Acme Challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

